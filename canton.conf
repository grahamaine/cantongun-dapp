// CantonGun — local Canton topology.
//
// One sync domain + one participant is enough to demo confidentiality: every party
// is hosted on the participant, and Canton only ever shares a contract with its
// signatories and observers. For a multi-bank demo, run one participant per
// institution and connect them all to the shared domain.
canton {
  participants {
    cantongun {
      storage.type = memory
      admin-api.port = 5012
      ledger-api.port = 5011
    }
  }

  domains {
    cantonGunDomain {
      storage.type = memory
      public-api.port = 5018
      admin-api.port = 5019
    }
  }
}
